<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARVO Template Validator</title>
  <meta name="description" content="Quality validator for ARVO question item upload templates. Detects missing answers, format errors, and discrepancies — with one-click auto-fixes." />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230891b2'/%3E%3Cpath d='M30 52 L44 66 L72 36' stroke='white' stroke-width='10' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    html, body, #root { height: 100%; margin: 0; padding: 0; }
    body { font-family: "DM Sans", system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    .loading-screen { display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column; gap: 12px; color: #64748b; font-size: 14px; }
    .spinner { width: 32px; height: 32px; border: 3px solid #e2e8f0; border-top-color: #0891b2; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root">
    <div class="loading-screen">
      <div class="spinner"></div>
      <div>Loading ARVO Template Validator…</div>
    </div>
  </div>

  <script type="text/babel" data-type="module" data-presets="react">
    const { useState, useCallback, useMemo } = React;
    const XLSX = window.XLSX;

    // ─── Inline Lucide Icon Components ───
    const Icon = ({ children, size = 16, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
    );
    const CheckCircle = (p) => <Icon {...p}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></Icon>;
    const Upload = (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></Icon>;
    const AlertTriangle = (p) => <Icon {...p}><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></Icon>;
    const XCircle = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></Icon>;
    const FileSpreadsheet = (p) => <Icon {...p}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/></Icon>;
    const Layers = (p) => <Icon {...p}><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></Icon>;
    const Download = (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></Icon>;
    const RotateCcw = (p) => <Icon {...p}><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></Icon>;
    const Wrench = (p) => <Icon {...p}><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></Icon>;
    const Sparkles = (p) => <Icon {...p}><path d="M12 3l1.9 5.8a2 2 0 0 0 1.3 1.3L21 12l-5.8 1.9a2 2 0 0 0-1.3 1.3L12 21l-1.9-5.8a2 2 0 0 0-1.3-1.3L3 12l5.8-1.9a2 2 0 0 0 1.3-1.3L12 3z"/></Icon>;
    const ChevronDown = (p) => <Icon {...p}><polyline points="6 9 12 15 18 9"/></Icon>;
    const ChevronUp = (p) => <Icon {...p}><polyline points="18 15 12 9 6 15"/></Icon>;
    const X = (p) => <Icon {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></Icon>;

    // Load JSZip from CDN
    function loadJSZip() {
      return new Promise((resolve, reject) => {
        if (window.JSZip) return resolve(window.JSZip);
        const s = document.createElement("script");
        s.src = "https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js";
        s.onload = () => resolve(window.JSZip);
        s.onerror = reject;
        document.head.appendChild(s);
      });
    }

    const ACCENT = "#0891b2";
    const SUCCESS = "#16a34a";
    const ERROR = "#dc2626";
    const WARN = "#d97706";
    const BG = "#f8fafc";

    function detectTemplateType(sheetName) {
      const n = sheetName.toLowerCase();
      if (n.includes("mcq")) return "MCQ";
      if (n.includes("truefalse") || n.includes("true false") || n.includes("t/f")) return "TF";
      if (n.includes("fillinblank") || n.includes("fill in blank") || n.includes("fib")) return "FIB";
      return null;
    }

    const SKIP_SHEETS = new Set(["alignments", "audiences", "fillinblanktypes", "topics", "instructions", "database info"]);

    function findCol(headers, ...names) {
      for (const name of names) {
        const i = headers.findIndex(h => h && String(h).trim().toLowerCase() === name.toLowerCase());
        if (i !== -1) return i;
      }
      return -1;
    }

    function isEmpty(v) {
      if (v == null) return true;
      return String(v).trim() === "";
    }

    function trim(v) {
      return v == null ? "" : String(v).trim();
    }

    function fixMCQCorrectAnswer(val, opts) {
      if (val == null) return null;
      let s = String(val).trim();
      if (/^[A-D]$/i.test(s)) return s.toUpperCase();
      const m = s.match(/^([A-Da-d])[\)\.\:]/);
      if (m) return m[1].toUpperCase();
      const m2 = s.match(/^Option\s+([A-Da-d])/i);
      if (m2) return m2[1].toUpperCase();
      if (s === "1") return "A";
      if (s === "2") return "B";
      if (s === "3") return "C";
      if (s === "4") return "D";
      if (opts) {
        const stripped = s.replace(/^[A-Da-d][\)\.\:]\s*/, "").trim().toLowerCase();
        const labels = ["A", "B", "C", "D"];
        for (let i = 0; i < 4; i++) {
          const opt = opts[i];
          if (opt && trim(opt).toLowerCase() === stripped) return labels[i];
          if (opt && trim(opt).toLowerCase() === s.toLowerCase()) return labels[i];
        }
      }
      return null;
    }

    function fixOptionPrefix(val) {
      if (val == null) return val;
      const s = String(val).trim();
      const stripped = s.replace(/^[A-Da-d][\)\.\:]\s*/, "");
      return stripped !== s ? stripped : null;
    }

    function fixTFAnswer(val) {
      if (val == null) return null;
      const s = String(val).trim().toUpperCase();
      if (s === "1" || s === "2") return s;
      if (s === "TRUE" || s === "T" || s === "YES" || s === "Y") return "1";
      if (s === "FALSE" || s === "F" || s === "NO" || s === "N") return "2";
      return null;
    }

    function fixFIBType(val) {
      if (val == null) return null;
      const s = String(val).trim().toLowerCase().replace(/[\s_-]/g, "");
      if (s === "default" || s === "general") return "Default";
      if (s === "wordbank") return "Word Bank";
      return null;
    }

    function fixOptionsDelimiter(val) {
      if (val == null) return null;
      const s = String(val).trim();
      if (s.includes("|")) return null;
      if (s.includes(",")) {
        return s.split(",").map(p => p.trim()).filter(Boolean).join(" | ");
      }
      return null;
    }

    function validateMCQRow(row, headers, ci) {
      const issues = [];
      const fixes = {};
      if (isEmpty(row[ci.stmt])) issues.push({ type: "error", field: "Statement*", msg: "Empty statement", autoFix: false });
      const opts = [row[ci.optA], row[ci.optB], row[ci.optC], row[ci.optD]];
      const optKeys = ["OptionA*", "OptionB*", "OptionC*", "OptionD*"];
      const optIndices = [ci.optA, ci.optB, ci.optC, ci.optD];
      for (let i = 0; i < 4; i++) {
        if (isEmpty(opts[i])) {
          issues.push({ type: "error", field: optKeys[i], msg: "Empty option", autoFix: false });
        } else {
          const stripped = fixOptionPrefix(opts[i]);
          if (stripped !== null) {
            fixes[optIndices[i]] = stripped;
            issues.push({ type: "autofix", field: optKeys[i], msg: `Stripped prefix: "${trim(opts[i])}" → "${stripped}"`, autoFix: true });
          }
        }
      }
      const cleaned = opts.map(o => trim(o).toLowerCase()).filter(Boolean);
      const dupSet = new Set();
      const dups = new Set();
      cleaned.forEach(o => { if (dupSet.has(o)) dups.add(o); else dupSet.add(o); });
      if (dups.size > 0) {
        issues.push({ type: "warning", field: "Options", msg: `Duplicate option text: "${[...dups].join(", ")}"`, autoFix: false });
      }
      if (isEmpty(row[ci.corr])) {
        issues.push({ type: "error", field: "CorrectAnswer*", msg: "Empty correct answer", autoFix: false });
      } else {
        const fixed = fixMCQCorrectAnswer(row[ci.corr], opts);
        if (fixed && fixed !== trim(row[ci.corr])) {
          fixes[ci.corr] = fixed;
          issues.push({ type: "autofix", field: "CorrectAnswer*", msg: `Normalized: "${trim(row[ci.corr])}" → "${fixed}"`, autoFix: true });
        } else if (!fixed) {
          issues.push({ type: "error", field: "CorrectAnswer*", msg: `Invalid format: "${trim(row[ci.corr])}" — must be A, B, C, or D`, autoFix: false });
        } else {
          const idx = "ABCD".indexOf(fixed);
          if (idx >= 0 && isEmpty(opts[idx])) {
            issues.push({ type: "error", field: "CorrectAnswer*", msg: `Answer "${fixed}" points to an empty option`, autoFix: false });
          }
        }
      }
      if (isEmpty(row[ci.primary])) issues.push({ type: "error", field: "PrimaryTopicName*", msg: "Empty primary topic", autoFix: false });
      if (ci.align >= 0 && isEmpty(row[ci.align])) {
        fixes[ci.align] = "English - Left Align";
        issues.push({ type: "autofix", field: "AlignmentName*", msg: `Set default: "English - Left Align"`, autoFix: true });
      }
      if (ci.aud >= 0 && isEmpty(row[ci.aud])) {
        fixes[ci.aud] = "Student";
        issues.push({ type: "autofix", field: "AudienceNames", msg: `Set default: "Student"`, autoFix: true });
      }
      return { issues, fixes };
    }

    function validateTFRow(row, headers, ci) {
      const issues = [];
      const fixes = {};
      if (isEmpty(row[ci.stmt])) issues.push({ type: "error", field: "Statement*", msg: "Empty statement", autoFix: false });
      if (ci.opt1 >= 0 && isEmpty(row[ci.opt1])) {
        fixes[ci.opt1] = "True";
        issues.push({ type: "autofix", field: "Option1*", msg: `Set default: "True"`, autoFix: true });
      }
      if (ci.opt2 >= 0 && isEmpty(row[ci.opt2])) {
        fixes[ci.opt2] = "False";
        issues.push({ type: "autofix", field: "Option2*", msg: `Set default: "False"`, autoFix: true });
      }
      if (isEmpty(row[ci.corr])) {
        issues.push({ type: "error", field: "CorrectAnswer*", msg: "Empty correct answer", autoFix: false });
      } else {
        const fixed = fixTFAnswer(row[ci.corr]);
        if (fixed && fixed !== trim(row[ci.corr])) {
          fixes[ci.corr] = fixed;
          issues.push({ type: "autofix", field: "CorrectAnswer*", msg: `Normalized: "${trim(row[ci.corr])}" → "${fixed}"`, autoFix: true });
        } else if (!fixed) {
          issues.push({ type: "error", field: "CorrectAnswer*", msg: `Invalid: "${trim(row[ci.corr])}" — must be 1 or 2`, autoFix: false });
        }
      }
      if (isEmpty(row[ci.primary])) issues.push({ type: "error", field: "PrimaryTopics*", msg: "Empty primary topic", autoFix: false });
      if (ci.align >= 0 && isEmpty(row[ci.align])) {
        fixes[ci.align] = "English - Left Align";
        issues.push({ type: "autofix", field: "AlignmentName*", msg: `Set default: "English - Left Align"`, autoFix: true });
      }
      if (ci.aud >= 0 && isEmpty(row[ci.aud])) {
        fixes[ci.aud] = "Student";
        issues.push({ type: "autofix", field: "AudienceNames*", msg: `Set default: "Student"`, autoFix: true });
      }
      return { issues, fixes };
    }

    function validateFIBRow(row, headers, ci) {
      const issues = [];
      const fixes = {};
      if (isEmpty(row[ci.stmt])) {
        issues.push({ type: "error", field: "Statement*", msg: "Empty statement", autoFix: false });
      } else if (!String(row[ci.stmt]).includes("$")) {
        issues.push({ type: "error", field: "Statement*", msg: "Statement has no $ blank marker", autoFix: false });
      }
      if (ci.bid >= 0) {
        const bid = trim(row[ci.bid]);
        if (bid !== "$") {
          fixes[ci.bid] = "$";
          issues.push({ type: "autofix", field: "BlankIdentifier*", msg: `Set to "$"`, autoFix: true });
        }
      }
      let typeVal = trim(row[ci.type]);
      let normalizedType = typeVal;
      if (isEmpty(typeVal)) {
        issues.push({ type: "error", field: "FillInBlankType*", msg: "Empty type", autoFix: false });
      } else {
        const fixed = fixFIBType(typeVal);
        if (fixed && fixed !== typeVal) {
          fixes[ci.type] = fixed;
          normalizedType = fixed;
          issues.push({ type: "autofix", field: "FillInBlankType*", msg: `Normalized: "${typeVal}" → "${fixed}"`, autoFix: true });
        } else if (!fixed) {
          issues.push({ type: "error", field: "FillInBlankType*", msg: `Invalid: "${typeVal}" — must be Default or Word Bank`, autoFix: false });
        } else {
          normalizedType = fixed;
        }
      }
      if (isEmpty(row[ci.ans])) issues.push({ type: "error", field: "Answers*", msg: "Empty answers", autoFix: false });
      if (normalizedType === "Word Bank") {
        if (ci.opts >= 0) {
          if (isEmpty(row[ci.opts])) {
            issues.push({ type: "error", field: "Options", msg: "Word Bank type requires Options", autoFix: false });
          } else {
            const fixed = fixOptionsDelimiter(row[ci.opts]);
            if (fixed) {
              fixes[ci.opts] = fixed;
              issues.push({ type: "autofix", field: "Options", msg: `Converted commas to pipes`, autoFix: true });
            }
            const optList = (fixed || trim(row[ci.opts])).split("|").map(s => s.trim().toLowerCase());
            const ansList = trim(row[ci.ans]).split(/[;|]/).map(s => s.trim().toLowerCase()).filter(Boolean);
            const missing = ansList.filter(a => !optList.includes(a));
            if (missing.length > 0) {
              issues.push({ type: "warning", field: "Answers*", msg: `Answer(s) not in Options: ${missing.join(", ")}`, autoFix: false });
            }
          }
        }
        if (ci.shuf >= 0 && isEmpty(row[ci.shuf])) {
          fixes[ci.shuf] = "Yes";
          issues.push({ type: "autofix", field: "IsShuffled", msg: `Set default: "Yes" for Word Bank`, autoFix: true });
        }
        if (ci.drag >= 0 && isEmpty(row[ci.drag])) {
          fixes[ci.drag] = "Yes";
          issues.push({ type: "autofix", field: "IsDragDrop", msg: `Set default: "Yes" for Word Bank`, autoFix: true });
        }
      } else if (normalizedType === "Default") {
        if (ci.opts >= 0 && !isEmpty(row[ci.opts])) {
          fixes[ci.opts] = "";
          issues.push({ type: "autofix", field: "Options", msg: `Cleared (Default type doesn't use Options)`, autoFix: true });
        }
        if (ci.shuf >= 0) {
          const v = trim(row[ci.shuf]).toLowerCase();
          if (v === "yes" || isEmpty(v)) {
            fixes[ci.shuf] = "No";
            issues.push({ type: "autofix", field: "IsShuffled", msg: v === "yes" ? `Set "No" for Default type` : `Set default: "No"`, autoFix: true });
          }
        }
        if (ci.drag >= 0) {
          const v = trim(row[ci.drag]).toLowerCase();
          if (v === "yes" || isEmpty(v)) {
            fixes[ci.drag] = "No";
            issues.push({ type: "autofix", field: "IsDragDrop", msg: v === "yes" ? `Set "No" for Default type` : `Set default: "No"`, autoFix: true });
          }
        }
      }
      if (!isEmpty(row[ci.stmt]) && !isEmpty(row[ci.ans])) {
        const blanks = (String(row[ci.stmt]).match(/\$/g) || []).length;
        const answerGroups = trim(row[ci.ans]).split(";").length;
        if (blanks > 0 && blanks !== answerGroups) {
          issues.push({ type: "warning", field: "Answers*", msg: `${blanks} blank(s) in statement but ${answerGroups} answer group(s)`, autoFix: false });
        }
      }
      if (isEmpty(row[ci.primary])) issues.push({ type: "error", field: "PrimaryTopics*", msg: "Empty primary topic", autoFix: false });
      if (ci.align >= 0 && isEmpty(row[ci.align])) {
        fixes[ci.align] = "English - Left Align";
        issues.push({ type: "autofix", field: "AlignmentName*", msg: `Set default: "English - Left Align"`, autoFix: true });
      }
      if (ci.aud >= 0 && isEmpty(row[ci.aud])) {
        fixes[ci.aud] = "Student";
        issues.push({ type: "autofix", field: "AudienceNames*", msg: `Set default: "Student"`, autoFix: true });
      }
      return { issues, fixes };
    }

    function Badge({ color, children }) {
      const colors = {
        green: "bg-emerald-100 text-emerald-800",
        red: "bg-red-100 text-red-800",
        amber: "bg-amber-100 text-amber-800",
        blue: "bg-cyan-100 text-cyan-800",
        gray: "bg-slate-100 text-slate-600",
        purple: "bg-purple-100 text-purple-800",
      };
      return <span className={`inline-flex items-center px-2 py-0.5 rounded-full text-xs font-semibold ${colors[color] || colors.gray}`}>{children}</span>;
    }

    function StatCard({ label, value, color, icon: IconC }) {
      return (
        <div className="bg-white rounded-xl p-4 shadow-sm border border-slate-100 flex items-center gap-3">
          <div className="w-10 h-10 rounded-lg flex items-center justify-center" style={{ backgroundColor: color + "18", color }}>
            <IconC size={20} />
          </div>
          <div>
            <div className="text-2xl font-bold text-slate-800">{value}</div>
            <div className="text-xs text-slate-500 font-medium">{label}</div>
          </div>
        </div>
      );
    }

    function ManualFixInput({ rowId, colIdx, onApply }) {
      const [val, setVal] = useState("");
      return (
        <div className="flex gap-2 mt-1.5">
          <input value={val} onChange={e => setVal(e.target.value)} placeholder="Enter value..."
            className="flex-1 px-2 py-1 border border-slate-200 rounded text-xs focus:outline-none focus:ring-1 focus:ring-cyan-300" />
          <button onClick={() => { if (val.trim()) { onApply(rowId, colIdx, val.trim()); setVal(""); } }}
            disabled={!val.trim()}
            className="px-3 py-1 rounded text-xs font-semibold text-white bg-cyan-600 hover:bg-cyan-700 disabled:opacity-40">
            Fix
          </button>
        </div>
      );
    }

    function RowCard({ rr, expanded, onToggle, onManualFix, files }) {
      if (rr.errors === 0 && rr.warnings === 0 && rr.autofixes === 0) {
        return (
          <div className="bg-white rounded-lg border border-slate-100 p-3 flex items-center gap-3">
            <CheckCircle size={14} className="text-emerald-400 flex-shrink-0" />
            <Badge color="gray">{rr.templateType}</Badge>
            <span className="text-xs text-slate-400 truncate">{rr.fileName} → {rr.sheetName} → Row {rr.rowIdx + 1}</span>
            <span className="text-xs text-slate-500 flex-1 truncate">{rr.statement}</span>
          </div>
        );
      }
      const headers = files[rr.fileIdx]?.sheets[rr.sheetIdx]?.data[0] || [];
      return (
        <div className="bg-white rounded-xl border border-slate-100 overflow-hidden">
          <button onClick={onToggle} className="w-full p-3 flex items-start gap-3 hover:bg-slate-50 text-left">
            <div className="flex-1 min-w-0">
              <div className="flex items-center gap-2 flex-wrap mb-1">
                <Badge color="blue">{rr.templateType}</Badge>
                {rr.errors > 0 && <Badge color="red">{rr.errors} error{rr.errors > 1 ? "s" : ""}</Badge>}
                {rr.warnings > 0 && <Badge color="amber">{rr.warnings} warning{rr.warnings > 1 ? "s" : ""}</Badge>}
                {rr.autofixes > 0 && <Badge color="purple">{rr.autofixes} auto-fix{rr.autofixes > 1 ? "es" : ""}</Badge>}
              </div>
              <div className="text-xs text-slate-400 mb-0.5">{rr.fileName} → {rr.sheetName} → Row {rr.rowIdx + 1}</div>
              <div className="text-sm text-slate-600 truncate">{rr.statement || "(empty statement)"}</div>
            </div>
            {expanded ? <ChevronUp size={16} className="text-slate-300 flex-shrink-0" /> : <ChevronDown size={16} className="text-slate-300 flex-shrink-0" />}
          </button>
          {expanded && (
            <div className="border-t border-slate-100 bg-slate-50/50 p-3 space-y-2">
              {rr.issues.map((iss, i) => {
                const colIdx = headers.findIndex(h => h && String(h).trim() === iss.field);
                return (
                  <div key={i} className="flex items-start gap-2">
                    <div className="flex-shrink-0 mt-0.5">
                      {iss.type === "error" ? <XCircle size={14} className="text-red-500" /> :
                       iss.type === "warning" ? <AlertTriangle size={14} className="text-amber-500" /> :
                       <Wrench size={14} className="text-purple-500" />}
                    </div>
                    <div className="flex-1 min-w-0">
                      <div className="text-xs">
                        <span className="font-mono font-semibold text-slate-700">{iss.field}</span>
                        <span className="text-slate-600"> — {iss.msg}</span>
                      </div>
                      {iss.type === "error" && colIdx >= 0 && (
                        <ManualFixInput rowId={rr.id} colIdx={colIdx} onApply={onManualFix} />
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }

    function App() {
      const [files, setFiles] = useState([]);
      const [validationResults, setValidationResults] = useState(null);
      const [autoFixesApplied, setAutoFixesApplied] = useState(false);
      const [manualFixes, setManualFixes] = useState({});
      const [exportedFiles, setExportedFiles] = useState([]);
      const [filterMode, setFilterMode] = useState("issues");
      const [expandedRows, setExpandedRows] = useState({});

      const handleUpload = useCallback((e) => {
        const fileList = Array.from(e.target.files || []);
        if (!fileList.length) return;
        setValidationResults(null);
        setAutoFixesApplied(false);
        setManualFixes({});
        setExportedFiles([]);
        const promises = fileList.map(f => new Promise(resolve => {
          const reader = new FileReader();
          reader.onload = (evt) => {
            try {
              const wb = XLSX.read(evt.target.result, { type: "array" });
              const sheets = [];
              wb.SheetNames.forEach(sn => {
                const data = XLSX.utils.sheet_to_json(wb.Sheets[sn], { header: 1, defval: null });
                const isSkip = SKIP_SHEETS.has(sn.toLowerCase());
                const tType = isSkip ? null : detectTemplateType(sn);
                sheets.push({ sheetName: sn, data, templateType: tType, isReference: isSkip || !tType });
              });
              resolve({ fileName: f.name, sheets });
            } catch (err) {
              resolve({ fileName: f.name, error: err.message });
            }
          };
          reader.readAsArrayBuffer(f);
        }));
        Promise.all(promises).then(parsed => setFiles(parsed));
      }, []);

      const runValidation = useCallback(() => {
        const allRowResults = [];
        let totalRows = 0, totalErrors = 0, totalAutofixes = 0, totalWarnings = 0, cleanRows = 0;
        files.forEach((file, fIdx) => {
          if (file.error) return;
          file.sheets.forEach((sheet, sIdx) => {
            if (sheet.isReference || !sheet.templateType) return;
            const data = sheet.data;
            if (data.length < 2) return;
            const headers = data[0].map(h => h ? String(h).trim() : "");
            let ci;
            if (sheet.templateType === "MCQ") {
              ci = {
                stmt: findCol(headers, "Statement*", "Statement"),
                optA: findCol(headers, "OptionA*", "OptionA"),
                optB: findCol(headers, "OptionB*", "OptionB"),
                optC: findCol(headers, "OptionC*", "OptionC"),
                optD: findCol(headers, "OptionD*", "OptionD"),
                corr: findCol(headers, "CorrectAnswer*", "CorrectAnswer"),
                primary: findCol(headers, "PrimaryTopicName*", "PrimaryTopicName"),
                align: findCol(headers, "AlignmentName*", "AlignmentName"),
                aud: findCol(headers, "AudienceNames"),
              };
            } else if (sheet.templateType === "TF") {
              ci = {
                stmt: findCol(headers, "Statement*", "Statement"),
                opt1: findCol(headers, "Option1*", "Option1"),
                opt2: findCol(headers, "Option2*", "Option2"),
                corr: findCol(headers, "CorrectAnswer*", "CorrectAnswer"),
                primary: findCol(headers, "PrimaryTopics*", "PrimaryTopics"),
                align: findCol(headers, "AlignmentName*", "AlignmentName"),
                aud: findCol(headers, "AudienceNames*", "AudienceNames"),
              };
            } else if (sheet.templateType === "FIB") {
              ci = {
                stmt: findCol(headers, "Statement*", "Statement"),
                bid: findCol(headers, "BlankIdentifier*", "BlankIdentifier"),
                type: findCol(headers, "FillInBlankType*", "FillInBlankType"),
                opts: findCol(headers, "Options"),
                ans: findCol(headers, "Answers*", "Answers"),
                shuf: findCol(headers, "IsShuffled"),
                drag: findCol(headers, "IsDragDrop"),
                primary: findCol(headers, "PrimaryTopics*", "PrimaryTopics"),
                align: findCol(headers, "AlignmentName*", "AlignmentName"),
                aud: findCol(headers, "AudienceNames*", "AudienceNames"),
              };
            }
            for (let r = 1; r < data.length; r++) {
              const row = data[r];
              if (!row || row.every(c => c == null || String(c).trim() === "")) continue;
              totalRows++;
              let result;
              if (sheet.templateType === "MCQ") result = validateMCQRow(row, headers, ci);
              else if (sheet.templateType === "TF") result = validateTFRow(row, headers, ci);
              else if (sheet.templateType === "FIB") result = validateFIBRow(row, headers, ci);
              const errors = result.issues.filter(i => i.type === "error").length;
              const warnings = result.issues.filter(i => i.type === "warning").length;
              const autofixes = result.issues.filter(i => i.type === "autofix").length;
              totalErrors += errors;
              totalWarnings += warnings;
              totalAutofixes += autofixes;
              if (errors === 0 && warnings === 0 && autofixes === 0) cleanRows++;
              allRowResults.push({
                id: `${fIdx}-${sIdx}-${r}`,
                fileIdx: fIdx, sheetIdx: sIdx, rowIdx: r,
                fileName: file.fileName, sheetName: sheet.sheetName,
                templateType: sheet.templateType,
                issues: result.issues, fixes: result.fixes,
                errors, warnings, autofixes,
                statement: trim(row[ci.stmt]).slice(0, 100),
              });
            }
          });
        });
        setValidationResults({ rows: allRowResults, totalRows, totalErrors, totalAutofixes, totalWarnings, cleanRows });
      }, [files]);

      const applyAutoFixes = useCallback(() => {
        setFiles(prevFiles => {
          const newFiles = prevFiles.map(f => ({ ...f, sheets: f.sheets.map(s => ({ ...s, data: s.data.map(r => r ? r.slice() : r) })) }));
          validationResults.rows.forEach(rr => {
            const sheet = newFiles[rr.fileIdx].sheets[rr.sheetIdx];
            const row = sheet.data[rr.rowIdx];
            Object.entries(rr.fixes).forEach(([colIdx, val]) => { row[parseInt(colIdx)] = val; });
          });
          return newFiles;
        });
        setAutoFixesApplied(true);
        setTimeout(() => runValidation(), 50);
      }, [validationResults, runValidation]);

      const applyManualFix = useCallback((rowId, colIdx, value) => {
        const rr = validationResults.rows.find(r => r.id === rowId);
        if (!rr) return;
        setFiles(prevFiles => {
          const newFiles = prevFiles.map(f => ({ ...f, sheets: f.sheets.map(s => ({ ...s, data: s.data.map(r => r ? r.slice() : r) })) }));
          newFiles[rr.fileIdx].sheets[rr.sheetIdx].data[rr.rowIdx][colIdx] = value;
          return newFiles;
        });
        setManualFixes(prev => ({ ...prev, [`${rowId}-${colIdx}`]: value }));
        setTimeout(() => runValidation(), 50);
      }, [validationResults, runValidation]);

      const generateExports = useCallback(() => {
        const results = [];
        files.forEach(file => {
          if (file.error) return;
          try {
            const wb = XLSX.utils.book_new();
            file.sheets.forEach(sheet => {
              const ws = XLSX.utils.aoa_to_sheet(sheet.data.map(r => r ? r.map(c => c == null ? "" : c) : []));
              XLSX.utils.book_append_sheet(wb, ws, sheet.sheetName);
            });
            const b64 = XLSX.write(wb, { bookType: "xlsx", type: "base64" });
            const dataUrl = "data:application/vnd.openxmlformats-officedocument.spreadsheetml.sheet;base64," + b64;
            results.push({ fileName: file.fileName, dataUrl });
          } catch (err) {
            results.push({ fileName: file.fileName, error: err.message });
          }
        });
        setExportedFiles(results);
      }, [files]);

      const downloadAllZip = useCallback(async () => {
        const JSZip = await loadJSZip();
        const zip = new JSZip();
        exportedFiles.filter(f => f.dataUrl).forEach(f => {
          zip.file(f.fileName, f.dataUrl.split(",")[1], { base64: true });
        });
        const blob = await zip.generateAsync({ type: "blob" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "Validated_Templates.zip";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 1000);
      }, [exportedFiles]);

      const resetAll = useCallback(() => {
        setFiles([]);
        setValidationResults(null);
        setAutoFixesApplied(false);
        setManualFixes({});
        setExportedFiles([]);
        setExpandedRows({});
      }, []);

      const filteredRows = useMemo(() => {
        if (!validationResults) return [];
        if (filterMode === "errors") return validationResults.rows.filter(r => r.errors > 0);
        if (filterMode === "warnings") return validationResults.rows.filter(r => r.warnings > 0);
        if (filterMode === "autofixes") return validationResults.rows.filter(r => r.autofixes > 0);
        if (filterMode === "issues") return validationResults.rows.filter(r => r.errors > 0 || r.warnings > 0 || r.autofixes > 0);
        return validationResults.rows;
      }, [validationResults, filterMode]);

      const toggleExpand = (id) => setExpandedRows(prev => ({ ...prev, [id]: !prev[id] }));

      return (
        <div className="flex h-screen w-full" style={{ fontFamily: "'DM Sans', system-ui, sans-serif", background: BG }}>
          <div className="w-64 flex-shrink-0 text-white flex flex-col" style={{ background: "linear-gradient(180deg, #0c4a6e 0%, #155e75 100%)" }}>
            <div className="p-5">
              <div className="text-xs font-bold tracking-widest uppercase opacity-60 mb-1">ARVO Schools</div>
              <div className="text-lg font-bold">Template Validator</div>
              <div className="text-xs opacity-50 mt-0.5">Quality Check & Auto-Fix</div>
            </div>
            <div className="flex-1 px-4 space-y-3 text-sm text-white/70">
              <div className="space-y-1">
                <div className="text-xs uppercase tracking-wider opacity-60">Validates</div>
                <div className="flex items-center gap-2"><div className="w-1.5 h-1.5 rounded-full bg-cyan-300"></div> MCQ Templates</div>
                <div className="flex items-center gap-2"><div className="w-1.5 h-1.5 rounded-full bg-cyan-300"></div> TrueFalse Templates</div>
                <div className="flex items-center gap-2"><div className="w-1.5 h-1.5 rounded-full bg-cyan-300"></div> FillInBlank Templates</div>
              </div>
              <div className="space-y-1 pt-3">
                <div className="text-xs uppercase tracking-wider opacity-60">Detects</div>
                <div className="text-xs">Empty fields, invalid answers, format mismatches, duplicate options, missing topics, blank/answer mismatches, prefix issues</div>
              </div>
              <div className="space-y-1 pt-3">
                <div className="text-xs uppercase tracking-wider opacity-60">Auto-Fixes</div>
                <div className="text-xs">Answer formats, option prefixes, type normalization, default alignments & audiences, comma→pipe conversion</div>
              </div>
            </div>
            <div className="p-4 border-t border-white/10 text-xs text-white/30">Validator v1.0</div>
          </div>

          <div className="flex-1 overflow-auto">
            <div className="max-w-5xl mx-auto p-6 space-y-5">
              <div>
                <h1 className="text-2xl font-bold text-slate-800">Template Quality Validator</h1>
                <p className="text-sm text-slate-500 mt-1">Upload converted template files to detect and fix discrepancies, missing answers, and format errors.</p>
              </div>

              {files.length === 0 && (
                <div className="bg-white rounded-xl shadow-sm border border-slate-100 p-5">
                  <label className="flex flex-col items-center justify-center border-2 border-dashed border-slate-200 rounded-xl p-10 cursor-pointer hover:border-cyan-300 hover:bg-cyan-50/30 transition-all">
                    <Upload size={32} className="text-slate-300 mb-3" />
                    <span className="text-sm font-semibold text-slate-600">Click to upload template Excel files</span>
                    <span className="text-xs text-slate-400 mt-1">Multiple files supported · MCQ, TrueFalse, FillInBlank templates</span>
                    <input type="file" accept=".xlsx,.xls" multiple className="hidden" onChange={handleUpload} />
                  </label>
                </div>
              )}

              {files.length > 0 && !validationResults && (
                <>
                  <div className="bg-white rounded-xl shadow-sm border border-slate-100 p-5">
                    <div className="flex items-center justify-between mb-3">
                      <h2 className="font-semibold text-slate-700">Loaded Files ({files.length})</h2>
                      <button onClick={resetAll} className="text-xs text-slate-400 hover:text-slate-600">Clear</button>
                    </div>
                    <div className="space-y-2">
                      {files.map((f, i) => (
                        <div key={i} className="bg-slate-50 rounded-lg p-3">
                          <div className="font-medium text-sm text-slate-700">{f.fileName}</div>
                          {f.error ? (
                            <div className="text-xs text-red-500 mt-1">Error: {f.error}</div>
                          ) : (
                            <div className="space-y-1 mt-1">
                              {f.sheets.map((s, si) => (
                                <div key={si} className="flex items-center gap-2 text-xs pl-2">
                                  {s.templateType ? <CheckCircle size={12} className="text-emerald-500" /> : <X size={12} className="text-slate-300" />}
                                  <span className="text-slate-600">{s.sheetName}</span>
                                  {s.templateType ? <Badge color="blue">{s.templateType}</Badge> : <Badge color="gray">Reference</Badge>}
                                </div>
                              ))}
                            </div>
                          )}
                        </div>
                      ))}
                    </div>
                  </div>
                  <button onClick={runValidation}
                    className="w-full py-3 rounded-xl font-semibold text-white flex items-center justify-center gap-2"
                    style={{ background: `linear-gradient(135deg, ${ACCENT}, #0e7490)` }}>
                    <Sparkles size={18} /> Run Validation
                  </button>
                </>
              )}

              {validationResults && (
                <>
                  <div className="grid grid-cols-5 gap-3">
                    <StatCard label="Total Rows" value={validationResults.totalRows} color={ACCENT} icon={Layers} />
                    <StatCard label="Clean" value={validationResults.cleanRows} color={SUCCESS} icon={CheckCircle} />
                    <StatCard label="Auto-Fixes" value={validationResults.totalAutofixes} color="#8b5cf6" icon={Wrench} />
                    <StatCard label="Warnings" value={validationResults.totalWarnings} color={WARN} icon={AlertTriangle} />
                    <StatCard label="Errors" value={validationResults.totalErrors} color={ERROR} icon={XCircle} />
                  </div>

                  {validationResults.totalAutofixes > 0 && !autoFixesApplied && (
                    <div className="bg-purple-50 border border-purple-200 rounded-xl p-4 flex items-center justify-between">
                      <div className="flex items-center gap-3">
                        <Wrench size={20} className="text-purple-600" />
                        <div>
                          <div className="font-semibold text-purple-900">{validationResults.totalAutofixes} auto-fixable issues found</div>
                          <div className="text-xs text-purple-600 mt-0.5">Format normalizations, defaults, and prefix cleanups</div>
                        </div>
                      </div>
                      <button onClick={applyAutoFixes}
                        className="px-4 py-2 rounded-lg text-sm font-semibold text-white bg-purple-600 hover:bg-purple-700 flex items-center gap-1.5">
                        <Sparkles size={14} /> Apply All Auto-Fixes
                      </button>
                    </div>
                  )}

                  {validationResults.totalErrors === 0 && validationResults.totalWarnings === 0 && validationResults.totalAutofixes === 0 && (
                    <div className="bg-emerald-50 border border-emerald-200 rounded-xl p-6 text-center">
                      <CheckCircle size={36} className="text-emerald-500 mx-auto mb-2" />
                      <div className="text-lg font-bold text-emerald-800">All Clean!</div>
                      <div className="text-sm text-emerald-600 mt-1">{validationResults.totalRows} rows validated, no issues found.</div>
                    </div>
                  )}

                  {(validationResults.totalErrors > 0 || validationResults.totalWarnings > 0 || (validationResults.totalAutofixes > 0 && !autoFixesApplied)) && (
                    <div className="flex gap-2 flex-wrap">
                      {[
                        { k: "issues", label: `All Issues (${validationResults.rows.filter(r => r.errors + r.warnings + r.autofixes > 0).length})` },
                        { k: "errors", label: `Errors (${validationResults.rows.filter(r => r.errors > 0).length})` },
                        { k: "warnings", label: `Warnings (${validationResults.rows.filter(r => r.warnings > 0).length})` },
                        { k: "autofixes", label: `Auto-Fixes (${validationResults.rows.filter(r => r.autofixes > 0).length})` },
                        { k: "all", label: `All Rows (${validationResults.totalRows})` },
                      ].map(t => (
                        <button key={t.k} onClick={() => setFilterMode(t.k)}
                          className={`px-3 py-1.5 rounded-lg text-xs font-semibold transition-all ${filterMode === t.k ? "bg-cyan-100 text-cyan-700" : "bg-slate-100 text-slate-500 hover:bg-slate-200"}`}>
                          {t.label}
                        </button>
                      ))}
                    </div>
                  )}

                  {filteredRows.length > 0 && (
                    <div className="space-y-2 max-h-[60vh] overflow-auto pr-1">
                      {filteredRows.map(rr => (
                        <RowCard key={rr.id} rr={rr} expanded={!!expandedRows[rr.id]} onToggle={() => toggleExpand(rr.id)} onManualFix={applyManualFix} files={files} />
                      ))}
                    </div>
                  )}

                  {exportedFiles.length === 0 ? (
                    <button onClick={generateExports}
                      className="w-full py-3 rounded-xl font-semibold text-white flex items-center justify-center gap-2"
                      style={{ background: `linear-gradient(135deg, ${SUCCESS}, #059669)` }}>
                      <Download size={18} /> Generate Validated Files
                    </button>
                  ) : (
                    <div className="bg-white rounded-xl shadow-sm border border-slate-100 p-5 space-y-3">
                      <div className="flex items-center gap-2">
                        <CheckCircle size={18} className="text-emerald-500" />
                        <h2 className="font-semibold text-slate-700">Validated Files Ready</h2>
                      </div>
                      {exportedFiles.map((ef, i) => (
                        <div key={i} className="flex items-center justify-between bg-slate-50 rounded-lg p-3">
                          <div className="font-medium text-sm text-slate-700">{ef.fileName}</div>
                          {ef.dataUrl && (
                            <a href={ef.dataUrl} download={ef.fileName}
                              className="px-4 py-2 rounded-lg text-sm font-semibold text-white flex items-center gap-1.5 no-underline"
                              style={{ background: `linear-gradient(135deg, ${SUCCESS}, #059669)` }}>
                              <Download size={14} /> Download
                            </a>
                          )}
                        </div>
                      ))}
                      {exportedFiles.filter(f => f.dataUrl).length > 1 && (
                        <button onClick={downloadAllZip}
                          className="w-full py-2.5 rounded-xl font-semibold text-white flex items-center justify-center gap-2"
                          style={{ background: `linear-gradient(135deg, ${SUCCESS}, #059669)` }}>
                          <Download size={18} /> Download All as ZIP ({exportedFiles.filter(f => f.dataUrl).length})
                        </button>
                      )}
                    </div>
                  )}

                  <button onClick={resetAll}
                    className="w-full py-2.5 rounded-xl font-medium text-slate-500 bg-white border border-slate-200 hover:bg-slate-50 flex items-center justify-center gap-2">
                    <RotateCcw size={16} /> Start Over
                  </button>
                </>
              )}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
